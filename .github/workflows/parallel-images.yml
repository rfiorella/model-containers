# Build tuned containers optimized for different architectures
name: Build tuned containers

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_OWNER: rfiorella

jobs:
  # Build x86-64 variants on native runners
  build-x86-variants:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [debug, v3-znver1, v4-znver4]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set compiler flags for variant
        id: flags
        run: |
          case "${{ matrix.variant }}" in
            debug)
              echo "ARCH_FLAGS=-g -fPIC" >> $GITHUB_OUTPUT
              ;;
            v3-znver1)
              echo "ARCH_FLAGS=-march=x86-64-v3 -mtune=znver1" >> $GITHUB_OUTPUT
              ;;
            v4-znver4)
              echo "ARCH_FLAGS=-march=x86-64-v4 -mtune=znver4" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Build and push base-ubuntu (x86)
        uses: docker/build-push-action@v7
        with:
          context: ./base-ubuntu
          file: ./base-ubuntu/Dockerfile.tuned
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/model-containers:base-ubuntu-amd64-${{ matrix.variant }}
          build-args: |
            ARCH_FLAGS=${{ steps.flags.outputs.ARCH_FLAGS }}
            mpi_flavor=openmpi
            mpi_version=4.1.7
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push e3sm-dev (x86)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./e3sm-dev/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/model-containers:e3sm-dev-amd64-${{ matrix.variant }}
          build-args: |
            BASE_TAG=base-ubuntu-amd64-${{ matrix.variant }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build ARM variants on native ARM runners
  build-arm-variants:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        variant: [debug, generic]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set compiler flags for variant
        id: flags
        run: |
          case "${{ matrix.variant }}" in
            debug)
              echo "ARCH_FLAGS=-g -fPIC" >> $GITHUB_OUTPUT
              ;;
            generic)
              echo "ARCH_FLAGS=-O3 -fPIC" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Build and push base-ubuntu (ARM)
        uses: docker/build-push-action@v7
        with:
          context: ./base-ubuntu
          file: ./base-ubuntu/Dockerfile.tuned
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/model-containers:base-ubuntu-arm64-${{ matrix.variant }}
          build-args: |
            ARCH_FLAGS=${{ steps.flags.outputs.ARCH_FLAGS }}
            mpi_flavor=openmpi
            mpi_version=4.1.7
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push e3sm-dev (ARM)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./e3sm-dev/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/model-containers:e3sm-dev-arm64-${{ matrix.variant }}
          build-args: |
            BASE_TAG=base-ubuntu-arm64-${{ matrix.variant }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create multi-arch manifests for each variant
  create-manifests:
    needs: [build-x86-variants, build-arm-variants]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [debug]
        container: [base-ubuntu, e3sm-dev]
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_OWNER }}/model-containers:${{ matrix.container }}-${{ matrix.variant }} \
            ${{ env.IMAGE_OWNER }}/model-containers:${{ matrix.container }}-amd64-${{ matrix.variant }} \
            ${{ env.IMAGE_OWNER }}/model-containers:${{ matrix.container }}-arm64-${{ matrix.variant }}
